name = "podcoin101"
main = ".open-next/worker.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

# D1 Database (serverless SQLite)
# FOR LOCAL DEV ONLY: Create with "npx wrangler d1 create podcoin-db" and run "wrangler dev"
# 
# IMPORTANT FOR CLOUDFLARE PAGES GIT INTEGRATION:
# The D1 database binding MUST be configured in Cloudflare Dashboard:
#   Settings → Environment Variables → Add variable: DB = <database-id>
# The binding name must be "DB" (not "podcoin-db")

[vars]
# Local `wrangler dev` only — Cloudflare Pages git deployments do NOT use [vars].
# Set all env vars in Cloudflare Dashboard → Pages → Settings → Environment variables.
AUTH_TRUST_HOST = "true"

[build]
command = "npm run build:worker"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
